# =============================================================================
# PROJECT_CONFIG.yaml — Главный конфигурационный файл проекта
# =============================================================================
# Это файл, который пользователь заполняет перед запуском.
# Все остальные скиллы и агенты читают этот файл и адаптируют своё поведение.
# Заполняйте построчно. Каждый параметр подписан: зачем нужен и как влияет.
# =============================================================================


# =============================================================================
# project — Основная идентификация проекта
# =============================================================================
# Эти данные используются во всех артефактах: заголовки, schema.org,
# meta-теги, og-теги, тексты копирайтера.
# =============================================================================
project:
  # name: Название компании или бренда.
  #   Используется в: <title>, meta, og:title, schema.org Organization,
  #   заголовки текста, футер, копирайт.
  #   Пример: "DeSoft", "Acme Corp", "PixelStudio"
  name: "Your Company"

  # type: Тип сайта. Определяет структуру страниц и навигацию.
  #   landing      — одна страница, якорная навигация (#hero, #cases)
  #   corporate    — мультипейдж (/about/, /cases/, /contacts/)
  #   product      — гибрид: лендинг-hero + глубинные страницы продукта
  #   Влияет на: блок pages ниже, навигацию, структуру sitemap.xml.
  type: "landing"

  # goal: Цель сайта. Влияет на тон копирайтинга и призывы к действию.
  #   team_packaging   — упаковка команды (B2B, доверие, процесс, кейсы)
  #   product_sales    — продажа продукта (фичи, цена, демо, триал)
  #   lead_gen         — сбор лидов (форма, CTA, социальное доказательство)
  #   info             — информационный (блог, документация, портфолио)
  #   Влияет на: тексты копирайтера, выбор блоков, CTA-формулировки.
  goal: "lead_gen"

  # language: Язык сайта. Влияет на копирайтинг, lang-атрибут HTML,
  #   schema.org availableLanguage, SEO-регион.
  #   Поддерживается: ru, en. Другие языки — экспериментально.
  #   Влияет на: тексты, шрифты (кириллица vs латиница), SEO-метрики.
  language: "ru"

  # domain: Домен будущего сайта. Без https:// и без слэша на конце.
  #   Используется в: canonical URLs, og:url, schema.org url,
  #   sitemap.xml <loc>, robots.txt Sitemap.
  #   Пример: "desoft.ru", "example.com"
  domain: "example.com"


# =============================================================================
# pages — Структура страниц и блоков
# =============================================================================
# Определяет, какие страницы существуют и из каких блоков состоит каждая.
# Каждый блок берёт спецификацию из библиотеки скиллов (copywriter + designer).
# Для landing: одна страница с якорными блоками.
# Для corporate: несколько страниц, каждая — отдельный URL (/about/).
# =============================================================================
pages:
  # id: Уникальный идентификатор страницы. Используется в именах файлов
  #   (output/02-copy/index/, src/about/) и в навигации.
  # path: URL-путь страницы. Для мультипейдж — со слэшем на конце (/about/).
  #   Для landing — всегда /.
  # blocks: Список блоков на странице, в порядке сверху вниз.
  #   Каждый блок имеет id (уникальный на странице) и type (из библиотеки).
  #
  # Доступные типы блоков (библиотека):
  #   hero              — полноэкранный заголовок, H1, CTA
  #   text_center       — центрированный текст, заголовок + абзацы
  #   text_two_column   — две колонки: текст + изображение/статистика
  #   steps_horizontal  — горизонтальная шкала шагов (процесс)
  #   steps_vertical    — вертикальная шкала / таймлайн
  #   cards_grid        — сетка карточек (кейсы, продукты, команда)
  #   icon_grid         — сетка иконок с подписями (стек технологий)
  #   contacts_static   — статичные контакты (email, телефон, Telegram)
  #   contacts_form     — [BACKLOG] форма обратной связи
  #   footer            — футер, копирайт, ссылки
  #   navigation        — шапка, логотип, меню, CTA
  #   testimonials      — отзывы (цитата, автор, роль)
  #   pricing_table     — [BACKLOG] таблица тарифов
  #
  # Параметр count (опционально): количество элементов в блоке
  #   (шагов, карточек, иконок). Влияет на копирайтинг и grid-колонки.

  # === Главная страница (landing / corporate) ===
  - id: index
    path: /
    blocks:
      - id: nav
        type: navigation
      - id: hero
        type: hero
      - id: mission
        type: text_center
      - id: process
        type: steps_horizontal
        count: 5
      - id: cases
        type: cards_grid
        count: 3
      - id: stack
        type: icon_grid
      - id: contact
        type: contacts_static
      - id: footer
        type: footer

  # === Дополнительные страницы (только для corporate / product) ===
  # Раскомментируйте и настройте под проект.
  # Важно: path должен заканчиваться слэшем (/about/), иначе хостинг
  #   (Vercel/Netlify) может отдавать 404 или редирект.

  # - id: about
  #   path: /about/
  #   blocks:
  #     - id: nav
  #       type: navigation
  #     - id: hero_small
  #       type: hero
  #     - id: story
  #       type: text_two_column
  #     - id: team
  #       type: cards_grid
  #       count: 4
  #     - id: footer
  #       type: footer

  # - id: cases
  #   path: /cases/
  #   blocks:
  #     - id: nav
  #       type: navigation
  #     - id: hero_small
  #       type: hero
  #     - id: cases_full
  #       type: cards_grid
  #       count: 6
  #     - id: footer
  #       type: footer

  # - id: contacts
  #   path: /contacts/
  #   blocks:
  #     - id: nav
  #       type: navigation
  #     - id: contact_full
  #       type: contacts_static
  #     - id: footer
  #       type: footer

  # - id: privacy
  #   path: /privacy/
  #   blocks:
  #     - id: nav
  #       type: navigation
  #     - id: privacy_text
  #       type: text_center
  #     - id: footer
  #       type: footer


# =============================================================================
# ctas — Призывы к действию (Call-to-Action)
# =============================================================================
# Используются копирайтером в hero, навигации, контактном блоке.
# Влияют на конверсию. Меняйте под цель (goal) и аудиторию.
# =============================================================================
ctas:
  # primary: Главный CTA. Должен содержать глагол + выгоду + срок (опционально).
  #   Появляется в: hero, навигация, контакты.
  #   Примеры:
  #     "Обсудить проект — ответ за 1 день"
  #     "Запросить демо"
  #     "Начать бесплатно"
  primary: "Связаться с нами"

  # secondary: Вторичный CTA. Менее агрессивный, для тех, кто не готов
  #   к основному действию. Часто ведёт к контенту (кейсы, подробнее).
  #   Примеры:
  #     "Посмотреть кейсы"
  #     "Узнать больше"
  #     "Скачать презентацию"
  secondary: "Узнать больше"


# =============================================================================
# constraints — Ограничения и запреты
# =============================================================================
# Эти флаги защищают от ошибок: копирайтер не напишет форму,
#   дизайнер не добавит pricing, оркестратор не создаст backend-агента.
# =============================================================================
constraints:
  # no_forms: true = запретить любые HTML-формы (<form>, <input>) на сайте.
  #   Используется только статичный контакт (email, телефон, Telegram).
  #   false = разрешить формы (требует backend, см. docs/backlog/forms-backend.md).
  #   Влияет на: верстка (contacts_static vs contacts_form),
  #   копирайтинг (нет полей ввода), наличие backend-агента в пайплайне.
  #   Правовое ограничение: если нет механизма согласия на обработку
  #   персональных данных — оставьте true.
  no_forms: true

  # no_pricing: true = запретить блоки с ценами, тарифами, калькуляторами.
  #   Влияет на: дизайнер не добавит pricing_table, копирайтер не напишет цены.
  #   false = можно добавить pricing_table в blocks.
  no_pricing: false

  # single_page: true = сайт состоит из одной страницы (landing).
  #   Навигация — якорная (#hero, #cases). В pages только index.
  #   false = мультипейдж (corporate). В pages несколько страниц.
  #   Влияет на: структуру src/, навигацию, sitemap.xml, копирайтинг.
  single_page: true


# =============================================================================
# audience — Целевая аудитория
# =============================================================================
# Влияет на тон копирайтинга, выбор терминологии, глубину технических деталей,
#   формулировки CTA, блоки (например, stack для технической аудитории).
# =============================================================================
audience:
  # primary: Основной decision maker. Влияет на язык и аргументацию.
  #   CTO          — технический, фокус на архитектуре, стеке, масштабируемости
  #   CEO          — бизнесовый, фокус на ROI, сроках, конкурентных преимуществах
  #   ProductOwner — продуктовый, фокус на процессе, метриках, пользователях
  #   MarketingDir — маркетинговый, фокус на конверсии, воронке, бренде
  primary: "CTO"

  # secondary: Вторичная аудитория. Копирайтер добавляет аргументы
  #   и для них, но в меньшем приоритете.
  secondary: "CEO"

  # awareness_stage: Стадия осведомлённости рынка (Eugene Schwartz).
  #   Влияет на структуру текста: что объяснять, что принимать как данность.
  #   unaware          — не знают о проблеме (нужно будить боль)
  #   problem_aware    — знают проблему, ищут решение (фокус на problem-first)
  #   solution_aware   — знают решения, сравнивают (фокус на differentiation)
  #   product_aware    — знают продукт, решают покупать (фокус на proof, CTA)
  #   most_aware       — готовы к покупке (фокус на friction removal, цена)
  awareness_stage: "solution_aware"


# =============================================================================
# seo — Поисковая оптимизация и геотаргетинг
# =============================================================================
# Влияет на: title, meta description, schema.org, sitemap.xml,
#   hreflang (в будущем), тексты копирайтера (гео-зависимые термины).
# =============================================================================
seo:
  # geo_target: Уровень геотаргетинга. Определяет, упоминается ли локация
  #   в title, meta, schema.org и текстах.
  #   country   — указывается только страна (например, "Россия"). Широкий охват.
  #   region    — указывается регион/область (например, "Московская область").
  #   city      — указывается город (например, "Москва"). Узкий, но точный охват.
  #   global    — никакой геопривязки. Для международных продуктов.
  #   Влияет на: title tag ("... в России" vs "... в Москве" vs без гео),
  #   schema.org (addressCountry vs addressLocality vs без адреса),
  #   копирайтинг ("работаем по всей стране" vs "офис в центре Москвы").
  geo_target: "country"

  # country: Двухбуквенный код страны (ISO 3166-1 alpha-2).
  #   Используется в: schema.org addressCountry, HTML lang (дополнительно),
  #   SEO-региональные сигналы.
  #   Примеры: RU, US, KZ, BY, UA.
  country: "RU"

  # city: Название города. Заполняется ТОЛЬКО если geo_target: city или region.
  #   Если geo_target: country или global — оставьте null (или закомментируйте).
  #   Влияет на: title, meta, schema.org addressLocality, тексты.
  #   Примеры: "Москва", "Санкт-Петербург", "Алматы".
  # city: null


# =============================================================================
# reference — Референсные сайты (откуда черпать идеи)
# =============================================================================
# Можно указать один или несколько сайтов. Каждый имеет тип и фокус.
# reference-analyzer обработает все и создаст единый reference-analysis.md.
# =============================================================================
reference:
  # enabled: Включить ли анализ референсов перед стартом.
  #   true  — агент проанализирует сайты и создаст бриф (рекомендуется).
  #   false — пропустить анализ. Дизайнер и копирайтер работают с нуля
  #           по anti-generic guardrails и библиотеке блоков.
  enabled: false

  # analysis_method: Как анализировать референсы.
  #   auto    — сначала MCP/Firecrawl (если доступен), потом web_search,
  #             потом ручной шаблон. Автоматический fallback.
  #   manual  — только ручной шаблон (пользователь заполняет
  #             docs/brief/reference-analysis.md самостоятельно).
  analysis_method: auto

  # sources: Список референсных сайтов. Можно добавлять сколько угодно.
  #   Каждый source — отдельный URL с параметрами.
  #
  #   url:   Полный URL сайта. С https://.
  #   type:  Роль референса в проекте.
  #          primary    — ГЛАВНЫЙ референс. Отсюда копируем структуру страниц,
  #                       layout, навигацию, порядок блоков. В случае конфликта
  #                       primary имеет приоритет.
  #          secondary  — ДОПОЛНИТЕЛЬНЫЙ референс. Отсюда берём детали:
  #                       анимации, цветовую палитру, типографику, hover-эффекты.
  #          competitor — КОНКУРЕНТ. Анализируем positioning, формулировки УТП,
  #                       тексты, какие блоки используют. Цель — отличиться
  #                       или соответствовать ожиданиям рынка.
  #   focus: Что именно анализировать на этом сайте.
  #          all       — всё: структура, дизайн, тексты, анимации.
  #          structure — только структура страниц и блоков.
  #          design    — только визуал: цвета, шрифты, spacing, анимации.
  #          content   — только тексты: заголовки, CTA, тон, формулировки.
  #   notes: Ваши комментарии для анализатора. Что именно вам понравилось
  #          или что нужно скопировать/избежать. Необязательно, но повышает
  #          точность анализа.
  sources:
    - url: "https://desofttech.ru/"
      type: primary
      focus: all
      notes: "Копируем 5-шаговый процесс и hero-структуру. Нравятся формулировки."

    # Примеры дополнительных референсов (раскомментируйте при необходимости):
    # - url: "https://example.com/"
    #   type: secondary
    #   focus: design
    #   notes: "Нравится цветовая палитра и анимации при скролле."
    # - url: "https://competitor.com/"
    #   type: competitor
    #   focus: content
    #   notes: "Смотрим, как они формулируют УТП. Не копируем дизайн."


# =============================================================================
# BACKLOG — Фичи в разработке (не трогать, см. docs/backlog/)
# =============================================================================
# Эти блоки зарезервированы для будущих версий шаблона.
# Они не влияют на текущий пайплайн, но показывают roadmap.
# =============================================================================

forms:
  # enabled: Включить ли формы обратной связи.
  #   true  — требует backend (см. docs/backlog/forms-backend.md).
  #   false — используется только contacts_static (статичные контакты).
  #   Сейчас всегда false. Реализация backend — в бэклоге.
  enabled: false
  # BACKLOG: см. docs/backlog/forms-backend.md

i18n:
  # enabled: Включить ли мультиязычность.
  #   true  — сайт на нескольких языках (требует i18n-пайплайн).
  #   false — один язык (project.language).
  #   Сейчас всегда false. Реализация — в бэклоге.
  enabled: false
  # BACKLOG: см. docs/backlog/i18n-multilang.md
